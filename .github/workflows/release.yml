name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate before release
        run: python scripts/validate_pack.py
      - name: Build versioned zip
        run: python scripts/build.py --output "dist/mobcensus-${{ github.ref_name }}.zip"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mobcensus-${{ github.ref_name }}.zip
          generate_release_notes: true
