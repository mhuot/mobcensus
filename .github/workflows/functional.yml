name: Functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  load:
    name: Load supported versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      # supported-versions.json is the single source of truth for the matrix.
      # version-watch appends a release to it once that release passes.
      - id: read
        run: echo "versions=$(jq -c . supported-versions.json)" >> "$GITHUB_OUTPUT"

  functional:
    name: MC ${{ matrix.mc_version }} - boot and assert
    needs: load
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      # One version's failure shouldn't cancel the others.
      fail-fast: false
      matrix:
        mc_version: ${{ fromJSON(needs.load.outputs.versions) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache the prepared (jar + version markers) server dir per version. It is
      # produced by SETUP_ONLY below, which exits before any world is generated,
      # so the cached content is immutable and small. Bump -vN to refresh, or set
      # FORCE_REDOWNLOAD in the prepare step.
      - name: Restore cached server files
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: server
          key: mc-server-${{ matrix.mc_version }}-v2

      - name: Prepare server files (SETUP_ONLY - download, no launch)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p server
          docker run --rm \
            -e EULA=TRUE -e TYPE=VANILLA -e VERSION=${{ matrix.mc_version }} \
            -e SETUP_ONLY=true \
            -v "$PWD/server:/data" \
            itzg/minecraft-server:java25
          sudo chown -R "$(id -u):$(id -g)" server

      - name: Save server files to cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: server
          key: mc-server-${{ matrix.mc_version }}-v2

      # Boot the server (jar already staged in server/) and run the suite.
      - uses: ./.github/actions/boot-and-test
        with:
          mc-version: ${{ matrix.mc_version }}
