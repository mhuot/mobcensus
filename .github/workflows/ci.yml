name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate datapack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate metadata and JSON
        run: python scripts/validate_pack.py
      - name: Parse every JSON with jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          find . -name '*.json' -not -path './.git/*' -print0 \
            | while IFS= read -r -d '' f; do jq empty "$f"; done

  lint:
    name: Lint Python (black + pylint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install black pylint
      - name: black --check
        run: black --check scripts tests tools
      - name: pylint (fail under 8.0)
        run: pylint --fail-under=8.0 scripts/*.py tests/*.py tools/*.py

  build:
    name: Build datapack zip
    runs-on: ubuntu-latest
    needs: [validate, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: python scripts/build.py --output dist/mobcensus.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobcensus-datapack
          path: dist/mobcensus.zip
          if-no-files-found: error
